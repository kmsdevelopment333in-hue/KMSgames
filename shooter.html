<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>GAMING KING</title>
    <link rel="stylesheet" href="shooter.css">
</head>

<body>
    <div id="startScreen">
        <div class="content">
            <h1>GAMING KING</h1>
            <p>Survival Shooter</p>
            <button id="startButton">START GAME</button>
            <div class="controls-hint">
                <div class="control-group">
                    <p>DESKTOP</p>
                    <span>WASD to Move</span>
                    <span>MOUSE to Aim</span>
                    <span>CLICK or SPACE to Shoot</span>
                </div>
            </div>
            <div class="sensitivity-setting">
                <label for="sensitivitySlider">Mouse Sensitivity: <span id="sensValue">1.0</span></label>
                <input type="range" id="sensitivitySlider" min="0.1" max="5" step="0.1" value="1.0">
            </div>
        </div>
    </div>
    <div id="ui">
        <h1>GAMING KING</h1>
        <p>Level: <span id="level">1</span> | Score: <span id="score">0</span></p>
        <p>Controls: <strong>W, A, S, D</strong> / <strong>Left Touch</strong> to move | <strong>Mouse</strong> /
            <strong>Right Touch</strong> to aim & shoot</p>
    </div>
    <canvas id="gameCanvas"></canvas>
    <script src="game.js"></script>
    <script src="settings.js"></script>
</body>

</html>
